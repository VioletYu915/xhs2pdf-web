<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小红书笔记转PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }
    
    /* Hero 居中输入区 */
    .hero { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .hero-title { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; letter-spacing: 1px; }

    /* 输入区 */
    .toolbar { width: 100%; max-width: 680px; }
    .toolbar input { flex: 1; padding: 12px 16px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 10px; outline: none; }
    .toolbar input:focus { border-color: #ff2442; }
    .toolbar button { padding: 12px 24px; font-size: 15px; background: #ff2442; color: #fff; border: none; border-radius: 10px; cursor: pointer; white-space: nowrap; }
    .toolbar button:hover:not(:disabled) { background: #e01e3a; }
    .toolbar button:disabled { background: #ccc; cursor: not-allowed; }
    .print-btn { background: #07c160 !important; }
    .print-btn:hover { background: #06ad56 !important; }

    /* 内容区 */
    .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
    .note { background: #fff; border-radius: 16px; overflow: hidden; }
    .note-header { text-align: center; padding: 30px 20px 20px; border-bottom: 1px solid #f0f0f0; }
    .note-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .note-author { color: #999; font-size: 14px; }
    .note-content { padding: 20px; font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
    .note-images { padding: 0 20px; }
    .note-images img { width: 100%; border-radius: 8px; margin-bottom: 10px; display: block; }
    .note-tags { padding: 16px 20px; border-top: 1px solid #f0f0f0; }
    .note-tags span { display: inline-block; color: #ff2442; background: #fff0f0; padding: 4px 12px; border-radius: 12px; font-size: 13px; margin-right: 8px; margin-bottom: 6px; }
    .note-footer { text-align: center; color: #ccc; font-size: 12px; padding: 20px; }

    /* 状态 */
    .status { text-align: center; padding: 40px; color: #999; font-size: 15px; }
    .status.error { color: #ff2442; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #f0f0f0; border-top-color: #ff2442; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none; }

    /* 打印样式（极简版 — pdf-lib 生成 PDF 后不再依赖此样式） */
    @media print {
      .hero, .toolbar, .status { display: none !important; }
    }
  </style>
</head>
<body>

  <div class="hero no-print">
    <h1 class="hero-title">小红书笔记转PDF</h1>
    <div class="toolbar">
      <div style="display:flex;gap:10px;">
        <input id="urlInput" placeholder="粘贴小红书笔记链接，如 https://www.xiaohongshu.com/explore/xxxxx" />
        <button id="fetchBtn" onclick="fetchNote()">获取笔记</button>
        <button id="printBtn" class="print-btn hidden" onclick="downloadPdf()">下载PDF</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="status" class="status">粘贴小红书笔记链接，点击「获取笔记」</div>
    <div id="note" class="note hidden"></div>
  </div>

  <!-- pdf-lib 核心 + fontkit（嵌入中文字体必需） -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>

  <script>
    async function fetchNote() {
      var input = document.getElementById('urlInput');
      var btn = document.getElementById('fetchBtn');
      var status = document.getElementById('status');
      var note = document.getElementById('note');
      var printBtn = document.getElementById('printBtn');
      var url = input.value.trim();

      if (!url) { alert('请输入链接'); return; }

      // 解析 noteId
      var match = url.match(/\/(?:explore|discovery\/item|note)\/([a-zA-Z0-9]+)/);
      if (!match) { alert('链接格式不正确'); return; }
      var noteId = match[1];

      // 显示加载状态
      btn.disabled = true;
      btn.textContent = '获取中...';
      status.className = 'status';
      status.innerHTML = '<span class="spinner"></span>正在获取笔记内容...';
      status.classList.remove('hidden');
      note.classList.add('hidden');
      printBtn.classList.add('hidden');

      try {
        var res = await fetch('/.netlify/functions/fetch-note?note_id=' + noteId);
        var data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || '获取失败');
        }

        // 渲染笔记
        renderNote(data);
        status.classList.add('hidden');
        note.classList.remove('hidden');
        printBtn.classList.remove('hidden');
      } catch (err) {
        status.className = 'status error';
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '获取笔记';
      }
    }

    function renderNote(data) {
      var imagesHtml = (data.images || []).map(function(url) {
        return '<img src="' + url + '" loading="lazy" />';
      }).join('');

      var tagsHtml = (data.tags || []).map(function(tag) {
        return '<span>#' + escapeHtml(tag) + '</span>';
      }).join('');

      document.getElementById('note').innerHTML =
        '<div class="note-header">' +
          '<div class="note-title">' + escapeHtml(data.title) + '</div>' +
          '<div class="note-author">' + escapeHtml(data.author || '') + '</div>' +
        '</div>' +
        '<div class="note-images">' + imagesHtml + '</div>' +
        '<div class="note-content">' + escapeHtml(data.content) + '</div>' +
        (tagsHtml ? '<div class="note-tags">' + tagsHtml + '</div>' : '') +
        '<div class="note-footer">由笔记收藏助手生成 · 仅供个人学习收藏</div>';

      // 存储数据供 PDF 下载使用
      window.__currentNoteData = data;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // pdf-lib 文本自动换行（用 widthOfTextAtSize 逐字测量）
    function wrapText(font, text, fontSize, maxWidth) {
      var lines = [];
      var paragraphs = (text || '').split('\n');
      for (var p = 0; p < paragraphs.length; p++) {
        var para = paragraphs[p];
        if (!para) { lines.push(''); continue; }
        var currentLine = '';
        for (var i = 0; i < para.length; i++) {
          var testLine = currentLine + para[i];
          var width = font.widthOfTextAtSize(testLine, fontSize);
          if (width > maxWidth && currentLine) {
            lines.push(currentLine);
            currentLine = para[i];
          } else {
            currentLine = testLine;
          }
        }
        if (currentLine) lines.push(currentLine);
      }
      return lines;
    }

    // 过滤字体不支持的字符（保留中文、英文、数字、常用标点）
    function cleanText(text) {
      return (text || '').replace(/[^\u4e00-\u9fff\u3000-\u303f\uff00-\uffef\u0020-\u007e\n\r]/g, '');
    }

    // 用 pdf-lib 生成矢量 PDF（文字可选/可复制）
    async function downloadPdf() {
      var noteData = window.__currentNoteData;
      if (!noteData) { alert('请先获取笔记'); return; }

      var btn = document.getElementById('printBtn');
      var originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '生成中...';

      try {
        var doc = await PDFLib.PDFDocument.create();
        doc.registerFontkit(fontkit);

        // 加载完整中文字体（NotoSansCJKsc-Regular.otf ~16MB，浏览器会缓存）
        var fontUrl = 'https://cdn.jsdelivr.net/gh/notofonts/noto-cjk@main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf';
        var fontBytes = await fetch(fontUrl).then(function(r) { return r.arrayBuffer(); });
        var font = await doc.embedFont(fontBytes);

        var pageWidth = 595.28;
        var pageHeight = 841.89;
        var margin = 50;
        var contentWidth = pageWidth - margin * 2;

        var page = doc.addPage([pageWidth, pageHeight]);
        var y = pageHeight - margin;

        // === 标题 ===
        var titleLines = wrapText(font, cleanText(noteData.title || ''), 22, contentWidth);
        for (var t = 0; t < titleLines.length; t++) {
          if (y < margin + 30) { page = doc.addPage([pageWidth, pageHeight]); y = pageHeight - margin; }
          page.drawText(titleLines[t], { x: margin, y: y, size: 22, font: font, color: PDFLib.rgb(0, 0, 0) });
          y -= 28;
        }

        // === 作者 ===
        if (noteData.author) {
          y -= 8;
          page.drawText(cleanText(noteData.author), { x: margin, y: y, size: 10, font: font, color: PDFLib.rgb(0.5, 0.5, 0.5) });
          y -= 20;
        }

        // === 分隔线 ===
        y -= 5;
        page.drawRectangle({ x: margin, y: y - 1, width: contentWidth, height: 1, color: PDFLib.rgb(0.8, 0.8, 0.8) });
        y -= 15;

        // === 图片 ===
        var images = noteData.images || [];
        for (var i = 0; i < images.length; i++) {
          try {
            var imgRes = await fetch(images[i]);
            var imgBytes = await imgRes.arrayBuffer();
            // 小红书图片URL无扩展名，先试JPG再试PNG
            var img;
            try {
              img = await doc.embedJpg(imgBytes);
            } catch (e1) {
              img = await doc.embedPng(imgBytes);
            }
            var maxW = contentWidth;
            var maxH = 420;
            var scale = Math.min(maxW / img.width, maxH / img.height, 1);
            var w = img.width * scale;
            var h = img.height * scale;
            if (y - h < margin + 20) { page = doc.addPage([pageWidth, pageHeight]); y = pageHeight - margin; }
            page.drawImage(img, { x: margin + (maxW - w) / 2, y: y - h, width: w, height: h });
            y -= h + 12;
          } catch (imgErr) {
            console.warn('图片加载失败:', images[i], imgErr.message);
          }
        }
        y -= 5;

        // === 正文 ===
        if (noteData.content) {
          var contentLines = wrapText(font, cleanText(noteData.content), 12, contentWidth);
          for (var c = 0; c < contentLines.length; c++) {
            if (y < margin + 16) { page = doc.addPage([pageWidth, pageHeight]); y = pageHeight - margin; }
            page.drawText(contentLines[c], { x: margin, y: y, size: 12, font: font, color: PDFLib.rgb(0, 0, 0) });
            y -= 18;
          }
        }

        // === 标签 ===
        var tags = noteData.tags || [];
        if (tags.length > 0) {
          y -= 15;
          var tagText = '#' + tags.join('  #');
          var tagLines = wrapText(font, cleanText(tagText), 9, contentWidth);
          for (var tg = 0; tg < tagLines.length; tg++) {
            if (y < margin + 16) { page = doc.addPage([pageWidth, pageHeight]); y = pageHeight - margin; }
            page.drawText(tagLines[tg], { x: margin, y: y, size: 9, font: font, color: PDFLib.rgb(0.94, 0.14, 0.26) });
            y -= 12;
          }
        }

        // === 页脚 ===
        y -= 25;
        if (y < margin + 14) { page = doc.addPage([pageWidth, pageHeight]); y = pageHeight - margin; }
        page.drawText(cleanText('由笔记收藏助手生成 仅供个人学习收藏'), {
          x: margin, y: y, size: 8, font: font, color: PDFLib.rgb(0.6, 0.6, 0.6)
        });

        // 保存并下载
        var pdfBytes = await doc.save();
        var blob = new Blob([pdfBytes], { type: 'application/pdf' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'xiaohongshu_note.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

      } catch (err) {
        console.error(err);
        alert('PDF 生成失败: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    // 回车提交
    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') fetchNote();
    });
  </script>

</body>
</html>
